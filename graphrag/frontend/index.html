<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphRAG Explorer</title>
    <!-- Include Vis.js for Network Graphing -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script>
        window.API_BASE_URL = "<%= apiUrl %>";
    </script>
</head>

<body>
    <div class="container">
        <!-- Control Panel -->
        <div class="panel">
            <h1>🧠 GraphRAG Knowledge Extractor</h1>
            <p>Queue up multiple URLs or text snippets, then press submit to extract the knowledge graph.</p>

            <div class="input-group">
                <input type="text" id="inputData" placeholder="Enter a URL or raw text here...">
                <button id="addToQueueBtn">Add to Queue</button>
            </div>

            <div class="staging-area" id="stagingArea" style="display: none;">
                <h4>Pending Items:</h4>
                <ul class="staging-list" id="stagingList"></ul>
                <button id="extractBtn" style="width: 100%; background: #38a169;">
                    🚀 Extract Everything in Queue
                </button>
            </div>

            <div class="input-group">
                <button id="refreshBtn" class="secondary">Refresh Graph</button>
                <div style="display: flex; gap: 10px;">
                    <button class="secondary" id="exportJsonBtn">📥 Export
                        JSON</button>
                    <button class="secondary" id="exportCsvBtn">📥 Export CSV</button>
                </div>
            </div>
            <div id="status">Ready.</div>
        </div>

        <!-- Visualization Panel -->
        <div class="panel">
            <h3>Knowledge Graph</h3>
            <div id="mynetwork"></div>
        </div>
    </div>
</body>

</html>
