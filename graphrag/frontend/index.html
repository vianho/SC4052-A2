<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphRAG Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Include Vis.js for Network Graphing -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script>
        window.BASE_API_URL = "<%= apiUrl %>";
    </script>
</head>

<body class="bg-pink-50 text-pink-950 font-sans p-4 md:p-8 m-0">
    <div class="max-w-6xl mx-auto flex flex-col gap-6">

        <!-- Top Panel: Graph Builder -->
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-pink-200">
            <h1 class="text-3xl font-bold text-pink-800 mb-1">🌸 GraphRAG Studio</h1>
            <p class="text-pink-800/80 mb-6">Dynamically extract knowledge from URLs or text.</p>

            <div class="flex flex-col sm:flex-row gap-3 mb-5 items-center">
                <input type="text" id="inputData" placeholder="Enter a URL (e.g., Wikipedia link) or raw text..."
                    class="flex-grow w-full p-3 border-2 border-pink-200 rounded-lg text-base outline-none transition-colors focus:border-pink-500 focus:ring-2 focus:ring-pink-200">
                <button id="addToQueueBtn"
                    class="w-full sm:w-auto px-6 py-3 bg-pink-500 text-white rounded-lg text-base font-semibold hover:bg-pink-600 transition-all hover:-translate-y-0.5 shadow-sm">
                    Queue Data
                </button>
            </div>

            <div class="bg-pink-50/50 border-2 border-dashed border-pink-300 p-5 rounded-xl mb-5" id="stagingArea"
                style="display: none;">
                <h4 class="mt-0 mb-3 text-pink-600 font-semibold">Pending Ingestion:</h4>
                <ul class="list-none p-0 m-0 mb-4 max-h-40 overflow-y-auto" id="stagingList"></ul>
                <div class="flex gap-3">
                    <button id="extractBtn"
                        class="flex-grow px-6 py-3 bg-pink-500 text-white rounded-lg font-semibold hover:bg-pink-600 transition-all shadow-sm">
                        🚀 Extract & Build Graph
                    </button>
                    <button id="forceExtractBtn" title="Bypass cache to find missing facts"
                        class="px-6 py-3 bg-pink-800 text-white rounded-lg font-semibold hover:bg-pink-900 transition-all shadow-sm">
                        🔍 Deep Extraction
                    </button>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mt-2">
                <button id="refreshBtn"
                    class="px-5 py-2.5 bg-pink-800 text-white rounded-lg text-sm font-semibold hover:bg-pink-900 transition-colors">
                    🔄 Refresh Graph
                </button>
                <div class="flex gap-3">
                    <button id="exportJsonBtn"
                        class="px-5 py-2.5 bg-pink-600 text-white rounded-lg text-sm font-semibold hover:bg-pink-700 transition-colors">
                        📥 Export JSON
                    </button>
                    <button id="exportCsvBtn"
                        class="px-5 py-2.5 bg-pink-800 text-white rounded-lg text-sm font-semibold hover:bg-pink-900 transition-colors">
                        📥 Export CSV
                    </button>
                </div>
            </div>
            <div id="status" class="mt-4 font-bold text-pink-600 text-sm">System Ready.</div>
        </div>

        <!-- Middle Panel: Visualization -->
        <div class="bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-pink-200">
            <div id="mynetwork" class="w-full h-[600px] border-2 border-pink-100 rounded-xl bg-pink-50/30"></div>
        </div>

        <!-- Bottom Panel: Ask Questions (RAG) -->
        <div class="bg-purple-50 border-2 border-purple-200 p-6 md:p-8 rounded-2xl shadow-sm">
            <h3 class="text-2xl font-bold text-purple-800 mb-1">💬 Ask the Graph</h3>
            <p class="text-purple-800/80 mb-6">The PageRank algorithm will find the mathematical path to your answer!
            </p>

            <!-- Query Input Box -->
            <div class="flex flex-col sm:flex-row gap-3 items-center">
                <input type="text" id="questionInput" placeholder="e.g., What discoveries did Marie Curie make?"
                    class="flex-grow w-full p-3 border-2 border-purple-200 rounded-lg text-base outline-none transition-colors focus:border-purple-500 focus:ring-2 focus:ring-purple-200">
                <button id="askQuestionBtn"
                    class="w-full sm:w-auto px-6 py-3 bg-purple-600 text-white rounded-lg text-base font-semibold hover:bg-purple-700 transition-all hover:-translate-y-0.5 shadow-sm">
                    Ask AI ✨
                </button>
            </div>

            <!-- Response UI -->
            <div id="answerBox" class="mt-6 p-6 bg-white rounded-xl border-l-4 border-purple-600 shadow-sm"
                style="display: none;">
                <strong class="text-purple-800 text-lg">AI Answer:</strong>
                <p id="answerText" class="mt-3 mb-0 leading-relaxed text-gray-800 text-base"></p>
                <hr class="border-t border-purple-100 my-4">
                <p id="contextNodes" class="m-0 text-sm text-purple-600 italic"></p>
            </div>
        </div>
    </div>
</body>

</html>
